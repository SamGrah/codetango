name: CI

# Quality gate for the Astro site — runs on every PR (required by branch
# protection on main, so a red run blocks the merge). Delivery is PR-based; main
# only advances through merges, so there's no separate push trigger. Vercel
# handles deployment separately; this asserts the things a plain build can't —
# the near-zero-JS budget, agent-facing output contracts, pure-function behavior,
# and content conventions.
on:
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: astro/.node-version
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type & content check
        run: npm run check

      - name: Build (charts → astro build → pagefind index)
        run: npm run build

      - name: Test (unit + conventions + build-output + links)
        run: npm test
